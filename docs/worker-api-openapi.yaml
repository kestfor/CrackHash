openapi: 3.0.3
info:
  title: CrackHash Worker API
  description: |
    API воркера системы CrackHash.

    В Task 2 (Fault Tolerance) воркеры получают задачи через RabbitMQ очередь "tasks"
    и отправляют прогресс через очередь "tasks_progress".
    HTTP API используется только для health check.
  version: 2.0.0
  contact:
    name: CrackHash Team

servers:
  - url: http://worker-service:8081
    description: Worker service in Docker network

tags:
  - name: Health
    description: Проверка работоспособности воркера

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Проверка работоспособности воркера.
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Воркер работает нормально
          content:
            text/plain:
              schema:
                type: string
              example: "OK"

components:
  schemas:
    Task:
      type: object
      description: |
        Структура задачи, получаемой воркером из RabbitMQ очереди "tasks".
        Не является частью HTTP API — передаётся через сообщения.
      required:
        - task_id
        - target_hash
        - alphabet
        - max_length
        - start_index
        - end_index
      properties:
        task_id:
          type: string
          format: uuid
          description: Уникальный идентификатор задачи
        target_hash:
          type: string
          description: MD5 хэш, который нужно взломать
          pattern: '^[a-f0-9]{32}$'
        alphabet:
          type: string
          description: Полный алфавит для генерации слов
        max_length:
          type: integer
          description: Максимальная длина строки для перебора
          minimum: 1
        start_index:
          type: integer
          format: int64
          description: Начальный индекс диапазона (включительно)
          minimum: 0
        end_index:
          type: integer
          format: int64
          description: Конечный индекс диапазона (исключительно)
          minimum: 1

    TaskProgress:
      type: object
      description: |
        Структура прогресса, отправляемого воркером в RabbitMQ очередь "tasks_progress".
        Не является частью HTTP API — передаётся через сообщения.
      required:
        - task_id
        - worker_id
        - status
        - iterations_done
        - total_iterations
        - result
      properties:
        task_id:
          type: string
          format: uuid
        worker_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ NOT_STARTED, IN_PROGRESS, READY, ERROR ]
        iterations_done:
          type: integer
          minimum: 0
        total_iterations:
          type: integer
          minimum: 0
        result:
          type: array
          items:
            type: string