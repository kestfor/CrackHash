http:
  port: 8080

storage:
  db: "tasks"
  url: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/tasks?replicaSet=rs0&w=majority&journal=true

broker:
  url: amqp://guest:guest@rabbitmq:5672/
  requeue_limit: 2

hash_cracker:
  alphabet: "abcdefghijklmnopqrstuvwxyz0123456789"

retry_send_period: 5s

logger:
  level: INFO
  is_json: false